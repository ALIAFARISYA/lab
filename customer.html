<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Use JSP Scriplet and JSP Expression in Application</title>
    <style>
        h1 {
            margin: 0;
            padding: 20px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 795px;
            margin: 0 auto;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .title{
            margin-bottom: 20px;
            padding-left: 15px;
            border-left: 5px solid #6f42c1;
        }
        .form-title {
            color: #6f42c1;
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .radio-label {
            font-weight: normal;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit {
            background-color: #6f42c1;
            color: white;
        }
        .btn-submit:hover {
            background-color: #5a32a3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Use JSP Scriplet and JSP Expression in Application</h1>
        <div class="card">
            <h1 class="form-title">Customer Discount</h1>
            <form action="processCustomer.jsp" method="POST">
                <div class="form-group">
                    <label>Customer Code:</label>
                    <input type="text" name="customerCode" required>
                </div>
                <div class="form-group">
                    <label>Quantity (units):</label>
                    <input type="number" name="quantity" min="1" required>
                </div>
                <div class="form-group">
                    <label>Customer Type:</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="customerType" value="1" required> Normal Customer
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="customerType" value="2"> Privilege Customer
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-submit">Submit</button>
                    <button type="reset" class="btn btn-reset">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
